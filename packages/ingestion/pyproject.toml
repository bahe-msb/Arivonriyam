[project]
name = "ingestion"
version = "0.1.0"
description = "Multi-modal RAG ingestion pipeline (PDF -> Chroma, local Ollama)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "unstructured[all-docs]>=0.22.26",
    "langchain>=1.2.17",
    "langchain-community>=0.4.1",
    "langchain-ollama>=0.2.0",
    "langchain-experimental>=0.3.0",
    "pillow>=12.2.0",
    "sentence-transformers>=5.4.1",
    "rank-bm25>=0.2.2",
    "pgvector>=0.3.6",
    "psycopg[binary]>=3.2.0",
]
